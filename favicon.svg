<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="7" fill="#194152"/>
  <!-- Horizon line -->
  <line x1="6" y1="21" x2="26" y2="21" stroke="#F3F4F3" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <!-- Terracotta half-sun -->
  <path d="M9 21 A7 7 0 0 1 23 21" fill="#BA5934"/>
  <!-- Center ray (top) -->
  <line x1="16" y1="11" x2="16" y2="8" stroke="#BA5934" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Upper diagonal rays -->
  <line x1="11" y1="13" x2="9" y2="11" stroke="#BA5934" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="13" x2="23" y2="11" stroke="#BA5934" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lower side rays -->
  <line x1="8" y1="17" x2="5" y2="16" stroke="#BA5934" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="24" y1="17" x2="27" y2="16" stroke="#BA5934" stroke-width="1.3" stroke-linecap="round"/>
</svg>
